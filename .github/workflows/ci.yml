name: CI

# Runs on every PR into develop or main, and on direct pushes to those
# branches - this is the gate that must pass before merging.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    # Spin up a real Postgres for the test suite, matching CLAUDE.md's
    # rule of using a real DB rather than mocks.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dms_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dms_test_db
          SECRET_KEY: ci-test-secret-key
        run: pytest

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build
